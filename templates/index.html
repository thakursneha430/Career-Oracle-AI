<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Oracle AI 🔮</title>

    <!-- 🔥 Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- 🎨 CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>🔮 Career Oracle AI</h1>

        <!-- 🧠 Form -->
        <form id="career-form">
            <input type="text" id="interests" placeholder="Enter your interests (e.g. AI, design)" required>
            <input type="text" id="skills" placeholder="Enter your skills (e.g. Python, communication)" required>
            <input type="text" id="personality" placeholder="Personality (e.g. creative, analytical)" required>
            
            <button type="submit">Predict My Future 🔮</button>
        </form>

        <!-- 🔮 Result -->
        <div id="result"></div>
    </div>

    <!-- ⚡ JS -->
    <script src="/static/script.js"></script>

</body>
</html>
